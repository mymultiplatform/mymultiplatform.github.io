<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>jobsfordes - mymaARCHAPPLYAGENT</title>
  <style>
    :root {
      --bg-a: #f4f6f2;
      --bg-b: #ede7da;
      --ink: #1f2937;
      --muted: #5b6473;
      --card: #fffdf9;
      --accent: #0f766e;
      --yes: #065f46;
      --no: #9f1239;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      font-family: "Segoe UI", "Aptos", sans-serif;
      background: radial-gradient(circle at top left, var(--bg-a), var(--bg-b));
    }
    .wrap {
      max-width: 1120px;
      margin: 0 auto;
      padding: 22px;
    }
    .hero {
      background: var(--card);
      border-radius: 18px;
      padding: 20px;
      box-shadow: 0 12px 32px rgba(31, 41, 55, 0.08);
      margin-bottom: 16px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 30px;
      color: var(--accent);
    }
    .meta {
      color: var(--muted);
      font-size: 14px;
    }
    .job-card {
      background: var(--card);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 12px;
      box-shadow: 0 10px 28px rgba(15, 23, 42, 0.08);
      border: 1px solid rgba(148, 163, 184, 0.25);
    }
    .job-card.empty {
      border-style: dashed;
      text-align: center;
    }
    .job-head {
      display: flex;
      gap: 10px;
      align-items: baseline;
      flex-wrap: wrap;
    }
    .counter {
      font-weight: 700;
      color: var(--accent);
      background: rgba(15, 118, 110, 0.08);
      border-radius: 999px;
      padding: 3px 10px;
    }
    h2 {
      margin: 0;
      font-size: 20px;
    }
    .desc {
      margin: 10px 0 8px;
      line-height: 1.4;
    }
    .url a {
      color: var(--accent);
      word-break: break-all;
      text-decoration: none;
    }
    .url a:hover { text-decoration: underline; }
    .checks {
      margin: 10px 0 0;
      padding-left: 20px;
    }
    .checks li {
      margin: 4px 0;
    }
    .checks li.yes { color: var(--yes); }
    .checks li.no { color: var(--no); }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="hero">
      <h1>Jobs Agent applied :</h1>
      <div class="meta">Total successfully applied: <strong>0/200</strong></div>
      <div class="meta">Generated at: 2026-03-08 22:03:51</div>
    </section>
    
    <article class="job-card empty">
      <h2>0/200</h2>
      <p class="desc">No successful applications submitted yet.</p>
    </article>

  </main>
</body>
</html>
