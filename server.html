<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MyMultiplatform Server Redirect</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Segoe UI", Tahoma, Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      padding: 20px;
    }
    .card {
      width: min(560px, 100%);
      border: 1px solid #334155;
      border-radius: 14px;
      background: #111827;
      padding: 20px;
    }
    h1 { margin: 0 0 10px; font-size: 1.3rem; }
    p { margin: 0 0 12px; color: #cbd5e1; line-height: 1.5; }
    a {
      display: inline-block;
      margin-top: 8px;
      border-radius: 10px;
      padding: 10px 14px;
      background: #22c55e;
      color: #04210f;
      text-decoration: none;
      font-weight: 700;
    }
    code {
      background: #0b1220;
      border: 1px solid #243247;
      padding: 2px 6px;
      border-radius: 6px;
      color: #93c5fd;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Redirecting To PDF Server</h1>
    <p>This route now uses the live Ubuntu backend.</p>
    <p>If redirect does not happen automatically, open:
      <br><code id="targetText"></code>
    </p>
    <a id="openLink" href="#">Open PDF Server</a>
  </main>

  <script>
    const fallbackTarget = "https://totals-rehab-races-chemicals.trycloudflare.com/server";
    const targetTextEl = document.getElementById("targetText");
    const openLinkEl = document.getElementById("openLink");

    function setTarget(target) {
      openLinkEl.href = target;
      targetTextEl.textContent = target;
      setTimeout(() => {
        window.location.replace(target);
      }, 300);
    }

    async function resolveTarget() {
      const sources = [
        "https://raw.githubusercontent.com/mymultiplatform/mymultiplatform.github.io/main/server_target.json",
        "/server_target.json",
      ];
      for (const source of sources) {
        try {
          const separator = source.includes("?") ? "&" : "?";
          const response = await fetch(`${source}${separator}ts=${Date.now()}`, {
            cache: "no-store",
          });
          if (!response.ok) {
            continue;
          }
          const payload = await response.json();
          if (payload && typeof payload.target === "string" && payload.target.startsWith("https://")) {
            return payload.target;
          }
        } catch (_error) {
          // Try the next target source.
        }
      }
      return fallbackTarget;
    }

    resolveTarget().then(setTarget);
  </script>
</body>
</html>
