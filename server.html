<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MyMultiplatform /server</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Segoe UI", Tahoma, Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      padding: 20px;
    }
    .card {
      width: min(720px, 100%);
      border: 1px solid #334155;
      border-radius: 14px;
      background: #111827;
      padding: 22px;
    }
    h1 { margin: 0 0 10px; font-size: 1.35rem; }
    p { margin: 0 0 12px; color: #cbd5e1; line-height: 1.5; }
    .btn {
      display: inline-block;
      margin-top: 8px;
      border-radius: 10px;
      padding: 10px 14px;
      background: #22c55e;
      color: #04210f;
      text-decoration: none;
      font-weight: 700;
    }
    code {
      background: #0b1220;
      border: 1px solid #243247;
      padding: 2px 6px;
      border-radius: 6px;
      color: #93c5fd;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Direct /server Deployment</h1>
    <p>Cloudflare tunnel mode was disabled. This route is now expected to be served directly by your Ubuntu nginx backend.</p>
    <p>Current direct target configured in this repo:</p>
    <p><code id="targetText">Loading...</code></p>
    <a id="openLink" class="btn" href="#">Open Direct Server</a>
  </main>

  <script>
    const targetTextEl = document.getElementById("targetText");
    const openLinkEl = document.getElementById("openLink");
    const fallbackTarget = "https://licensing-islands-league-ever.trycloudflare.com/server";

    async function resolveTarget() {
      try {
        const response = await fetch(`/server_target.json?ts=${Date.now()}`, { cache: "no-store" });
        if (response.ok) {
          const payload = await response.json();
          if (payload && typeof payload.target === "string" && payload.target.length > 0) {
            return payload.target;
          }
        }
      } catch (_err) {
        // Use fallback target.
      }
      return fallbackTarget;
    }

    resolveTarget().then((target) => {
      targetTextEl.textContent = target;
      openLinkEl.href = target;
      window.location.replace(target);
    });
  </script>
</body>
</html>
