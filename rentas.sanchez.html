<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Rentas Sanchez / Redirect</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #111827;
      --line: #334155;
      --text: #e2e8f0;
      --muted: #cbd5e1;
      --accent: #22c55e;
    }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 18px;
      font-family: "Segoe UI", Tahoma, Arial, sans-serif;
      color: var(--text);
      background: radial-gradient(circle at top, #182236 0%, var(--bg) 50%);
    }
    .card {
      width: min(740px, 100%);
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--card);
      padding: 22px;
    }
    h1 { margin: 0 0 10px; }
    p { margin: 0 0 10px; color: var(--muted); line-height: 1.45; }
    code {
      display: inline-block;
      border: 1px solid #273447;
      border-radius: 8px;
      padding: 4px 8px;
      color: #93c5fd;
      background: #0b1220;
    }
    .btn {
      display: inline-block;
      margin-top: 10px;
      text-decoration: none;
      border-radius: 10px;
      padding: 10px 14px;
      background: var(--accent);
      color: #06210f;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Rentas Sanchez</h1>
    <p>Redirecting to your live rental application server now.</p>
    <p><code id="targetText">Loading target...</code></p>
    <a id="openLink" class="btn" href="#">Open Rentas Sanchez</a>
  </main>

  <script>
    const targetTextEl = document.getElementById("targetText");
    const openLinkEl = document.getElementById("openLink");
    const fallbackTarget = "https://voltage-prayers-lawrence-changelog.trycloudflare.com/rentas.sanchez";

    function routeFromTarget(rawTarget) {
      if (typeof rawTarget !== "string" || rawTarget.length === 0) {
        return fallbackTarget;
      }
      const base = rawTarget.replace(/\/server\/?$/, "");
      return `${base}/rentas.sanchez`;
    }

    async function resolveTarget() {
      try {
        const response = await fetch(`/server_target.json?ts=${Date.now()}`, { cache: "no-store" });
        if (response.ok) {
          const payload = await response.json();
          if (payload && typeof payload.target === "string" && payload.target.length > 0) {
            return routeFromTarget(payload.target);
          }
        }
      } catch (_err) {
      }
      return fallbackTarget;
    }

    resolveTarget().then((target) => {
      targetTextEl.textContent = target;
      openLinkEl.href = target;
      window.location.replace(target);
    });
  </script>
</body>
</html>
