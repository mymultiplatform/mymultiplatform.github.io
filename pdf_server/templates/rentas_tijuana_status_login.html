<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Rentas Tijuana Status Login</title>
  <style>
    :root { --bg:#eef4f8; --card:#fff; --line:#d6e1ea; --text:#122235; --muted:#5b6f7f; --accent:#0f766e; --danger:#b42318; }
    * { box-sizing: border-box; }
    body { margin:0; min-height:100vh; display:grid; place-items:center; padding:18px; font-family:"Segoe UI", Tahoma, Arial, sans-serif; background:var(--bg); color:var(--text); }
    .card { width:min(430px, 100%); background:var(--card); border:1px solid var(--line); border-radius:10px; padding:22px; box-shadow:0 12px 28px rgba(15,37,55,.12); }
    h1 { margin:0 0 6px; font-size:1.3rem; }
    p { margin:0 0 16px; color:var(--muted); }
    label { display:block; margin:12px 0 5px; font-weight:700; }
    input { width:100%; border:1px solid var(--line); border-radius:8px; padding:10px; font:inherit; }
    button { width:100%; margin-top:16px; border:0; border-radius:8px; padding:11px; font-weight:800; background:var(--accent); color:#fff; cursor:pointer; }
    .flash { border:1px solid #ffd0cb; background:#fff0ee; color:var(--danger); border-radius:8px; padding:9px; margin-bottom:10px; }
  </style>
</head>
<body>
  <main class="card">
    <h1>Application Status</h1>
    <p>Use the username and password you created in your application.</p>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="flash">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}
    <form method="post" action="{{ action_url }}">
      <label for="username">Username</label>
      <input id="username" name="username" autocomplete="username" required>
      <label for="password">Password</label>
      <input id="password" name="password" type="password" autocomplete="current-password" required>
      <button type="submit">View Status</button>
    </form>
  </main>
</body>
</html>
