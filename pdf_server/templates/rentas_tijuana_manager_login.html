<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Rentas Tijuana Manager Login</title>
  <style>
    :root { --bg:#0d1321; --card:#121c2e; --line:#2e405f; --text:#edf4ff; --muted:#a7b7d0; --accent:#14b8a6; --danger:#f87171; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 18px;
      font-family: "Segoe UI", Tahoma, Arial, sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, #111d32 0%, var(--bg) 55%);
    }
    .card {
      width: min(440px, 100%);
      border: 1px solid var(--line);
      border-radius: 10px;
      background: var(--card);
      padding: 22px;
      box-shadow: 0 14px 30px rgba(0,0,0,.28);
    }
    h1 { margin: 0 0 6px; font-size: 1.35rem; }
    p { margin: 0 0 16px; color: var(--muted); }
    label { display: block; margin: 12px 0 5px; font-weight: 700; }
    input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #0b1220;
      color: var(--text);
      padding: 10px;
      font: inherit;
    }
    button {
      width: 100%;
      margin-top: 16px;
      border: 0;
      border-radius: 8px;
      padding: 11px;
      font-weight: 800;
      background: var(--accent);
      color: #03201c;
      cursor: pointer;
    }
    .flash {
      border: 1px solid rgba(248,113,113,.45);
      background: rgba(248,113,113,.12);
      color: #fecaca;
      border-radius: 8px;
      padding: 9px;
      margin-bottom: 10px;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Rentas Tijuana Manager</h1>
    <p>Review applications, prepare move-in details, and generate contracts.</p>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="flash">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}
    <form method="post" action="{{ action_url }}">
      <label for="username">Username</label>
      <input id="username" name="username" autocomplete="username" required>
      <label for="password">Password</label>
      <input id="password" name="password" type="password" autocomplete="current-password" required>
      <button type="submit">Enter Manager Dashboard</button>
    </form>
  </main>
</body>
</html>
