<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Rentas Tijuana - Solicitud</title>
  <style>
    :root {
      --bg: #eef4f8;
      --card: #ffffff;
      --line: #d6e1ea;
      --text: #122235;
      --muted: #5b6f7f;
      --accent: #0f766e;
      --accent-dark: #0b5f59;
      --danger: #b42318;
      --ok: #1a7f37;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
      color: var(--text);
      background:
        linear-gradient(135deg, rgba(15, 118, 110, 0.12), transparent 34%),
        linear-gradient(315deg, rgba(29, 78, 216, 0.11), transparent 36%),
        var(--bg);
      padding: 24px;
    }
    .container {
      width: min(900px, 100%);
      margin: 0 auto;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 10px;
      box-shadow: 0 16px 36px rgba(15, 37, 55, 0.12);
      padding: 24px;
    }
    h1 { font-size: 1.55rem; margin: 0 0 8px; }
    .intro { margin: 0 0 18px; color: var(--muted); line-height: 1.5; }
    form { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 14px; }
    label { display: block; font-size: 0.86rem; font-weight: 700; margin-bottom: 6px; }
    input, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fbfdff;
      color: var(--text);
      padding: 11px 12px;
      font-size: 1rem;
    }
    textarea { min-height: 96px; resize: vertical; }
    input[type=file] { background: #ffffff; }
    .full { grid-column: 1 / -1; }
    .hidden { display: none; }
    .terms { display: flex; align-items: flex-start; gap: 9px; color: var(--muted); }
    .terms input { width: auto; margin-top: 3px; }
    .actions { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    button {
      border: 0;
      border-radius: 8px;
      padding: 11px 15px;
      background: var(--accent);
      color: #ffffff;
      font-weight: 800;
      cursor: pointer;
    }
    button:hover { background: var(--accent-dark); }
    button:disabled { opacity: 0.65; cursor: wait; }
    .ghost {
      background: #f4f7fa;
      color: var(--muted);
      border: 1px solid var(--line);
    }
    .ghost:hover { background: #ebf1f5; }
    .status {
      border-radius: 8px;
      padding: 10px 12px;
      font-weight: 700;
      display: none;
    }
    .status.ok { display: block; color: var(--ok); background: #edf8f0; border: 1px solid #b9e5c5; }
    .status.error { display: block; color: var(--danger); background: #fff0ee; border: 1px solid #ffd0cb; }
    .file-meta { color: var(--muted); font-size: 0.86rem; margin-top: 6px; line-height: 1.4; }
    @media (max-width: 720px) {
      body { padding: 14px; }
      .container { padding: 18px; }
      form { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="container">
    <h1>Solicitud de Renta - Tijuana</h1>
    <p class="intro">Completa la solicitud y adjunta documentos en PDF o imagen. La informacion se guarda en el servidor privado de MyMultiplatform.</p>

    <form id="registrationForm" enctype="multipart/form-data" novalidate>
      <div>
        <label for="firstName">Nombre *</label>
        <input id="firstName" name="firstName" type="text" required autocomplete="given-name" placeholder="Ej. Maria">
      </div>

      <div>
        <label for="lastName">Apellido *</label>
        <input id="lastName" name="lastName" type="text" required autocomplete="family-name" placeholder="Ej. Gonzalez">
      </div>

      <div class="full">
        <label for="address">Direccion actual *</label>
        <input id="address" name="address" type="text" required autocomplete="street-address" placeholder="Calle, numero, colonia">
      </div>

      <div>
        <label for="city">Ciudad *</label>
        <input id="city" name="city" type="text" required placeholder="Ej. Tijuana">
      </div>

      <div>
        <label for="state">Estado</label>
        <input id="state" name="state" type="text" placeholder="Ej. Baja California">
      </div>

      <div>
        <label for="postal">Codigo postal</label>
        <input id="postal" name="postal" type="text" inputmode="numeric" pattern="[0-9]{4,10}" placeholder="Ej. 22000">
      </div>

      <div>
        <label for="country">Pais *</label>
        <input id="country" name="country" type="text" required placeholder="Ej. Mexico" autocomplete="country-name">
      </div>

      <div>
        <label for="email">Correo electronico *</label>
        <input id="email" name="email" type="email" required autocomplete="email" placeholder="nombre@correo.com">
      </div>

      <div>
        <label for="phone">Telefono</label>
        <input id="phone" name="phone" type="tel" inputmode="tel" placeholder="+52 664 000 0000">
      </div>

      <div>
        <label for="dob">Fecha de nacimiento</label>
        <input id="dob" name="dob" type="date">
      </div>

      <div>
        <label for="username">Nombre de usuario</label>
        <input id="username" name="username" type="text" placeholder="usuario123" autocomplete="username">
      </div>

      <div class="full">
        <label for="notes">Notas</label>
        <textarea id="notes" name="notes" placeholder="Informacion adicional para la solicitud"></textarea>
      </div>

      <div class="full">
        <label for="files">Documentos e imagenes * - PDF, PNG, JPG o JPEG</label>
        <input id="files" name="files" type="file" accept="application/pdf,image/png,image/jpeg" multiple required aria-describedby="fileHelp">
        <div id="fileHelp" class="file-meta">Ningun archivo seleccionado. Maximo 40 MB por envio.</div>
      </div>

      <input class="hidden" id="website" name="website" type="text" autocomplete="off" tabindex="-1">

      <div class="full terms">
        <input id="terms" name="terms" type="checkbox" required>
        <label for="terms">Confirmo que la informacion enviada es correcta y autorizo guardarla para revisar mi solicitud. *</label>
      </div>

      <div class="full">
        <div id="status" class="status" role="status"></div>
      </div>

      <div class="full actions">
        <button id="submitBtn" type="submit">Enviar solicitud</button>
        <button type="button" class="ghost" id="clearBtn">Borrar formulario</button>
      </div>
    </form>
  </main>

  <script>
    (function(){
      const API_URL = 'https://facility-translate-perception-telescope.trycloudflare.com/server/rentas.tijuana/api/applications';
      const MAX_TOTAL_BYTES = 40 * 1024 * 1024;
      const ALLOWED_TYPES = new Set(['application/pdf', 'image/png', 'image/jpeg']);
      const form = document.getElementById('registrationForm');
      const fileInput = document.getElementById('files');
      const fileHelp = document.getElementById('fileHelp');
      const clearBtn = document.getElementById('clearBtn');
      const submitBtn = document.getElementById('submitBtn');
      const statusBox = document.getElementById('status');

      function setStatus(kind, text) {
        statusBox.className = 'status ' + kind;
        statusBox.textContent = text;
      }

      function clearStatus() {
        statusBox.className = 'status';
        statusBox.textContent = '';
      }

      function validateFiles() {
        const files = Array.from(fileInput.files);
        if (!files.length) {
          fileHelp.textContent = 'Ningun archivo seleccionado. Maximo 40 MB por envio.';
          return false;
        }
        const total = files.reduce((sum, file) => sum + file.size, 0);
        const invalid = files.find(file => !ALLOWED_TYPES.has(file.type));
        if (invalid) {
          fileHelp.textContent = 'Solo se permiten PDF, PNG, JPG o JPEG.';
          fileInput.value = '';
          return false;
        }
        if (total > MAX_TOTAL_BYTES) {
          fileHelp.textContent = 'Los archivos son demasiado grandes. Maximo 40 MB por envio.';
          fileInput.value = '';
          return false;
        }
        const sizeMB = (total / (1024 * 1024)).toFixed(2);
        fileHelp.textContent = files.length + ' archivo(s) seleccionado(s), ' + sizeMB + ' MB en total.';
        return true;
      }

      fileInput.addEventListener('change', () => {
        clearStatus();
        validateFiles();
      });

      clearBtn.addEventListener('click', () => {
        form.reset();
        clearStatus();
        fileHelp.textContent = 'Ningun archivo seleccionado. Maximo 40 MB por envio.';
      });

      form.addEventListener('submit', async (event) => {
        event.preventDefault();
        clearStatus();

        if (!form.reportValidity()) return;
        if (!validateFiles()) {
          setStatus('error', 'Adjunta por lo menos un PDF o imagen valida.');
          return;
        }

        submitBtn.disabled = true;
        submitBtn.textContent = 'Enviando...';

        try {
          const response = await fetch(API_URL, {
            method: 'POST',
            body: new FormData(form)
          });
          const result = await response.json().catch(() => ({}));
          if (!response.ok || !result.ok) {
            throw new Error(result.error || 'No se pudo guardar la solicitud.');
          }
          form.reset();
          fileHelp.textContent = 'Ningun archivo seleccionado. Maximo 40 MB por envio.';
          setStatus('ok', 'Solicitud recibida. ID: ' + result.submissionId);
        } catch (error) {
          setStatus('error', error.message || 'No se pudo conectar con el servidor.');
        } finally {
          submitBtn.disabled = false;
          submitBtn.textContent = 'Enviar solicitud';
        }
      });
    })();
  </script>
</body>
</html>
